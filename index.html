<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Python в браузере (Pyodide)</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.3/full/pyodide.js"></script>
</head>
<body>
    <h2>Запуск Python кода прямо в HTML</h2>
    <textarea id="pythonCode" rows="5" cols="60">def greet(name):
    return f"Привет, {name}!"

greet("Мир")</textarea>
    <br>
    <button onclick="runPython()">Выполнить Python</button>
    <h3>Результат:</h3>
    <pre id="output"></pre>

    <script>
        let pyodideReady = null;
        async function loadPyodide() {
            if (!pyodideReady) {
                pyodideReady = await loadPyodide({
                    indexURL: "https://cdn.jsdelivr.net/pyodide/v0.26.3/full/"
                });
            }
            return pyodideReady;
        }

        async function runPython() {
            const outputElem = document.getElementById('output');
            const code = document.getElementById('pythonCode').value;
            outputElem.innerText = "Загрузка Pyodide (первый раз может занять 5-10 секунд)...";
            
            try {
                const pyodide = await loadPyodide();
                // Перенаправляем вывод stdout/stderr
                pyodide.runPython(`
                    import sys
                    from io import StringIO
                    sys.stdout = StringIO()
                    sys.stderr = StringIO()
                `);
                
                pyodide.runPython(code);
                const stdout = pyodide.runPython("sys.stdout.getvalue()");
                const stderr = pyodide.runPython("sys.stderr.getvalue()");
                outputElem.innerText = stdout + (stderr ? "\nОшибки:\n" + stderr : "");
            } catch (err) {
                outputElem.innerText = "Ошибка выполнения:\n" + err;
            }
        }
    </script>
</body>
</html>
